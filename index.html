<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业掘金VIP</title>

<style>

/* ================= 背景（暗红金融氛围） ================= */

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Microsoft YaHei",sans-serif;
    overflow:hidden;

    background:
        radial-gradient(circle at 50% 20%, #3b0a0a 0%, transparent 60%),
        linear-gradient(135deg,#120202,#000000);
}

/* ================= 卡片 ================= */

.card{
    width:260px;
    height:400px;
    perspective:1200px;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.9s cubic-bezier(.4,.2,.2,1);
}

/* 翻转 */
.card.flip .card-inner{
    transform:rotateY(180deg);
}

/* 正反面 */
.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:18px;
    backface-visibility:hidden;
    overflow:hidden;

    box-shadow:
        0 20px 50px rgba(0,0,0,0.7);
}

/* ================= 正面 ================= */

.card-front{
    background:linear-gradient(160deg,#2a0c0c,#0b0101);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#ffd166;
}

/* 金色边框光效 */
.card-front::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;
    background:linear-gradient(120deg,
        transparent,
        rgba(255,215,0,0.6),
        transparent);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
}

/* 月亮（金色徽章效果） */
.moon{
    width:85px;
    height:85px;
    border-radius:50%;
    background:radial-gradient(circle,#fde68a,#f59e0b);
    margin-bottom:20px;
    box-shadow:0 0 30px rgba(255,200,0,0.45);
}

.front-text{
    letter-spacing:3px;
    font-size:22px;
}

.sub{
    margin-top:12px;
    font-size:13px;
    color:#e5c07b;
}

/* ================= 背面 ================= */

.card-back{
    transform:rotateY(180deg);

    background:linear-gradient(145deg,#1a0404,#0b0101);

    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);

    padding:22px;
    box-sizing:border-box;
    color:#f1f5f9;
}

.title{
    font-size:20px;
    color:#fbbf24;
    font-weight:bold;
    margin-bottom:16px;
}

.info{
    margin:9px 0;
    font-size:15px;
    color:#f3e8e8;
}

.tip{
    position:absolute;
    bottom:12px;
    width:100%;
    left:0;
    text-align:center;
    font-size:12px;
    color:#a78b8b;
}

/* ================= 悬浮呼吸动画 ================= */

.card{
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{ transform:translateY(0px);}
    50%{ transform:translateY(-12px);}
}

</style>
</head>

<body>

<div class="card" id="card">
    <div class="card-inner">

        <!-- 正面 -->
        <div class="card-front">
            <div class="moon"></div>
            <div class="front-text">THE MOON</div>
            <div class="sub">点击查看</div>
        </div>

        <!-- 背面 -->
        <div class="card-back">
            <div class="title">行业掘金VIP</div>

            <div class="info">管理人：吴金辉-钻石投顾</div>
            <div class="info">风险等级：R3</div>
            <div class="info">收费方式：1‰</div>
            <div class="info">组合风格：中短线</div>
            <div class="info">行业偏好：军工 + 证券 + 医药</div>
            <div class="info">累计收益率：101.7%</div>

            <div class="tip">点击卡片返回</div>
        </div>

    </div>
</div>

<script>

/* ================= 点击翻转 ================= */

const card = document.getElementById("card");

card.addEventListener("click", () => {

    /* 按压反馈 */
    card.style.transform = "scale(0.96)";

    setTimeout(()=>{
        card.style.transform = "";
        card.classList.toggle("flip");
    },120);
});

/* 微信触摸优化 */
card.addEventListener("touchstart", function(e){
    e.stopPropagation();
});

</script>

</body>
</html>
